<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inside the World of Spelling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:wght@400;700&family=Comic+Neue:wght@700&family=Carter+One&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --shadow-color: #000;
        }
        body {
            font-family: 'Balsamiq Sans', cursive;
            background-color: #1a1a1a;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden; /* Prevent scrolling */
        }
        
        .bg-app {
            background-image: url('https://media.wired.com/photos/64fa35ee93a336d16731ae1e/3:2/w_2560%2Cc_limit/Roblox-Gadget-Lab-Gear.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .bg-overlay {
            background-color: rgba(0, 0, 0, 0.7);
        }

        /* Roblox-style Button Class */
        .btn-roblox {
            border: 4px solid black;
            box-shadow: 6px 6px 0px 0px var(--shadow-color);
            transition: all 0.1s ease;
            text-transform: uppercase;
            font-weight: bold;
        }
        .btn-roblox:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px 0px var(--shadow-color);
        }
        .btn-roblox:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Font specific overrides */
        .font-roblox-title { font-family: 'Carter One', 'Comic Neue', cursive; }
        .font-balsamiq { font-family: 'Balsamiq Sans', cursive; }
        .font-comic { font-family: 'Comic Neue', cursive; }

        /* Keyboard Styles */
        .key {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #e5e7eb;
            border: 3px solid black;
            border-radius: 0.5rem;
            box-shadow: 2px 2px 0px 0px black;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.5rem;
            transition: background-color 0.1s, transform 0.1s;
        }
        .key:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px black;
        }
        .key-vowel { color: #ef4444; } /* Red */
        .key-consonant { color: #3b82f6; } /* Blue */
        .key-punct { color: #eab308; } /* Yellow */
        .key-action { background-color: #9ca3af; color: black; font-size: 1.2rem; }
        .key.disabled { opacity: 0.2; pointer-events: none; }

        /* Answer Box */
        .answer-box {
            border: 4px solid black;
            box-shadow: 4px 4px 0px 0px black;
            background-color: white;
            color: black;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .answer-box.active-cursor {
            border-color: #3b82f6 !important;
            background-color: #eff6ff;
            box-shadow: 0 0 10px #3b82f6;
        }
        .answer-box.merged {
            background-color: #4ade80; /* Green success */
            margin: 0 !important;
            color: white;
        }
        
        /* Utility */
        .hidden-screen { display: none !important; }

        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="w-screen h-screen m-0 p-0 text-white bg-app">
    
    <div class="w-full h-full bg-overlay absolute inset-0 z-0"></div>

    <!-- Main Container -->
    <div id="app-container" class="relative z-10 w-full h-full flex flex-col items-center justify-center p-4">

        <!-- ================= SCREEN 1: WELCOME ================= -->
        <div id="screen-1" class="screen flex flex-col items-center justify-center w-full max-w-4xl space-y-12">
            <h1 class="font-roblox-title text-5xl md:text-7xl text-center text-yellow-400 drop-shadow-[0_5px_5px_rgba(0,0,0,1)] stroke-black tracking-wider animate-float">
                Inside the World of Spelling
            </h1>
            
            <div class="flex flex-col space-y-6 w-full md:w-2/3">
                <button onclick="selectSchool('Shulin')" class="btn-roblox bg-green-500 hover:bg-green-400 text-white py-6 px-8 rounded-2xl text-2xl md:text-3xl">
                    Shulin Elementary School<br><span class="text-xl">臺南市七股區樹林國民小學</span>
                </button>
                <button onclick="selectSchool('Cigu')" class="btn-roblox bg-yellow-400 hover:bg-yellow-300 text-black py-6 px-8 rounded-2xl text-2xl md:text-3xl">
                    Cigu Elementary School<br><span class="text-xl">臺南市七股區七股國民小學</span>
                </button>
            </div>
            
            <!-- Resume Game Banner -->
            <div id="resume-banner" class="hidden flex-col items-center mt-4 p-4 bg-green-500 border-4 border-black rounded-xl shadow-[4px_4px_0_0_#000]">
                <p class="text-xl font-bold mb-2">Saved game found!</p>
                <button onclick="resumeGame()" class="btn-roblox bg-yellow-400 text-black py-2 px-6 rounded-lg">Resume</button>
                <button onclick="clearSave()" class="text-sm mt-2 underline cursor-pointer">Start Fresh</button>
            </div>
        </div>

        <!-- ================= SCREEN 2: SELECT CLASS ================= -->

            <div class="w-full flex justify-between items-center mb-10 px-4">
                <button onclick="nav('screen-1')" class="btn-roblox bg-gray-500 text-white py-2 px-6 rounded-xl text-xl">⬅ Back</button>
                <h2 class="font-roblox-title text-4xl text-white drop-shadow-[0_4px_4px_rgba(0,0,0,1)]">Select Class</h2>

            <div class="grid grid-cols-2 md:grid-cols-3 gap-6 w-full px-4 overflow-y-auto pb-10">

        </div>

        <!-- ================= SCREEN 3: SELECT STUDENT ================= -->

            <div class="w-full flex justify-between items-center mb-8 px-4">
                <button onclick="nav('screen-2')" class="btn-roblox bg-gray-500 text-white py-2 px-6 rounded-xl text-xl">⬅ Back</button>
                <h2 class="font-roblox-title text-4xl text-yellow-300 drop-shadow-[0_4px_4px_rgba(0,0,0,1)]">Who are you?</h2>
                <div class="w-24"></div>
            </div>
            
            <div id="student-grid" class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 w-full px-4 overflow-y-auto pb-20 custom-scrollbar content-start">

        </div>

        <!-- ================= SCREEN 4: SELECT TOPIC ================= -->

            <div class="w-full flex justify-between items-center mb-8 px-4">
                <button onclick="nav('screen-3')" class="btn-roblox bg-gray-500 text-white py-2 px-6 rounded-xl text-xl">⬅ Back</button>
                <h2 class="font-roblox-title text-4xl text-green-400 drop-shadow-[0_4px_4px_rgba(0,0,0,1)]">Choose Topic</h2>

        <!-- ================= SCREEN 5: SELECT SUBTOPIC ================= -->
        <div id="screen-5" class="screen hidden-screen flex flex-col items-center w-full max-w-6xl h-full py-10">
            <div class="w-full flex justify-between items-center mb-8 px-4">
                <button onclick="nav('screen-4')" class="btn-roblox bg-gray-500 text-white py-2 px-6 rounded-xl text-xl">⬅ Back</button>
                <h2 id="subtopic-title" class="font-roblox-title text-4xl text-pink-400 drop-shadow-[0_4px_4px_rgba(0,0,0,1)]">Mode</h2>

        <!-- ================= OVERLAY: READY COUNTDOWN ================= -->

        <!-- ================= SCREEN 6: GAMEPLAY ================= -->
        <div id="screen-game" class="screen hidden-screen flex flex-col w-full h-full max-w-[1920px] mx-auto overflow-hidden">
            
            <!-- UPPER (10%) - Transparent -->

                <div class="flex items-center space-x-2 md:space-x-6 w-full md:w-auto justify-between md:justify-start">
                    <div class="bg-white text-black font-bold px-3 py-1 md:px-4 md:py-2 rounded-xl border-2 border-black text-sm md:text-xl truncate max-w-[150px] md:max-w-xs" id="ui-student-name">Name</div>

                        Voice: <span id="ui-voice" class="ml-1">Girl</span>

                    <div class="bg-red-500 text-white font-roblox-title px-3 py-1 md:px-4 md:py-2 rounded-xl border-2 border-black text-lg md:text-2xl flex items-center min-w-[80px] justify-center">
                        ⏱ <span id="ui-timer" class="ml-1">08:00</span>
                    </div>
                </div>
            </div>

            <!-- MID (50%) - Transparent -->
            <div class="w-full h-[50%] flex flex-col md:flex-row bg-transparent relative overflow-hidden">
                
                <!-- Mid Left: Controls (Doubled Width: 180px to 220px) -->
                <div class="w-full md:w-[180px] lg:w-[220px] h-auto md:h-full flex flex-row md:flex-col items-center justify-center p-1.5 md:gap-3 bg-transparent z-10 shrink-0">
                    <button onclick="playWord(1)" class="btn-roblox w-[90%] bg-green-500 text-white py-2 md:py-3 rounded-2xl text-sm md:text-xl flex items-center justify-center min-w-0">
                        <span class="text-xl md:text-2xl mr-1 md:mr-2">▶</span> <span class="truncate">Listen</span>
                    </button>
                    <button onclick="playWord(0.5)" class="btn-roblox w-[90%] bg-teal-500 text-white py-2 md:py-3 rounded-2xl text-sm md:text-xl flex items-center justify-center min-w-0">
                        <span class="text-xl md:text-2xl mr-1 md:mr-2">🐢</span> <span class="truncate">Slow</span>
                    </button>
                    <button onclick="useHint()" class="btn-roblox w-[90%] bg-yellow-400 text-black py-2 md:py-3 rounded-2xl text-sm md:text-xl flex items-center justify-center relative group min-w-0">
                        <span class="text-xl md:text-2xl mr-1 md:mr-2">💡</span> <span class="truncate">Hint</span>
                        <span class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border border-black shadow-[1px_1px_0_0_#000]">-3</span>
                    </button>
                    <button onclick="skipWord()" class="btn-roblox w-[90%] bg-orange-500 text-white py-2 md:py-3 rounded-2xl text-sm md:text-xl flex items-center justify-center min-w-0">
                        <span class="text-xl md:text-2xl mr-1 md:mr-2">⏭</span> <span class="truncate">Skip</span>
                    </button>
                </div>

                <!-- Mid Right: Answer Area -->

                    <!-- Answer Boxes Container (Single horizontal line, flex-nowrap) -->
                    <div id="answer-container" class="flex flex-nowrap items-center justify-center gap-1 md:gap-3 w-full px-2">

                    </div>

                    <!-- Explicit Submit/Enter Button below the Answer Box -->

                        <button onclick="skipWord()" class="btn-roblox flex-1 bg-orange-500 text-white py-4 px-4 rounded-2xl text-xl md:text-2xl truncate min-w-0">Skip Word</button>
                    </div>

                    <!-- Next button (hidden until correct) -->
                    <div id="next-action" class="hidden mt-8 z-10">
                        <button onclick="nextWord()" class="btn-roblox bg-green-500 text-white py-4 px-16 rounded-2xl text-2xl md:text-3xl animate-bounce">NEXT ➔</button>
                    </div>
                </div>
            </div>

            <!-- BOTTOM (40%) - Virtual Keyboard (Opaque) -->

                <div id="feedback-overlay" class="absolute inset-0 z-30 flex items-center justify-center pointer-events-none opacity-0 transition-opacity duration-300 bg-black/45">
                    <div id="feedback-msg" class="font-roblox-title text-5xl md:text-7xl px-12 py-6 rounded-3xl border-8 border-black transform -rotate-3 text-white shadow-[10px_10px_0_0_#000]"></div>
                </div>

                <div id="keyboard" class="w-full max-w-[1200px] mx-auto flex flex-col gap-1 md:gap-2 h-full z-10">

                </div>
            </div>
        </div>

        <!-- ================= SCREEN 7: RESULTS ================= -->
        <div id="screen-result" class="screen hidden-screen flex flex-col items-center justify-center w-full max-w-2xl space-y-4 md:space-y-6 bg-white/95 p-4 md:p-6 rounded-3xl border-4 md:border-8 border-black shadow-[10px_10px_0_0_#000] relative max-h-[92vh] overflow-y-auto">
            
            <!-- Confetti Canvas -->
            <canvas id="confetti-canvas" class="absolute inset-0 pointer-events-none z-0 rounded-3xl"></canvas>

            <div class="relative z-10 flex flex-col items-center w-full text-center">

                <p id="result-badge-subtitle" class="font-bold text-gray-500 text-sm md:text-base uppercase tracking-widest mt-1">Rank Unlocked!</p>
            </div>
            
            <div class="relative z-10 flex flex-col items-center bg-yellow-100 p-4 md:p-6 rounded-2xl border-4 border-black w-full shadow-[4px_4px_0_0_rgba(0,0,0,1)]">
                <h2 id="result-name" class="font-bold text-4xl text-black mb-4 text-center break-words">Student Name</h2>
                
                <div class="flex flex-col sm:flex-row gap-4 w-full max-w-sm justify-center items-center text-center">
                    <div class="bg-yellow-400 p-4 rounded-xl border-4 border-black w-full shadow-[3px_3px_0_0_#000]">
                        <div class="text-sm text-black font-bold uppercase tracking-wider">Final Score</div>
                        <div id="result-score" class="text-4xl md:text-5xl font-roblox-title text-black mt-1">100</div>
                    </div>
                </div>
                
                <div class="mt-4 text-sm md:text-lg text-gray-700 font-bold bg-white px-6 py-2 rounded-full border-2 md:border-4 border-black shadow-[2px_2px_0_0_#000]">
                    Completed: <span id="result-words" class="text-blue-600 font-extrabold text-xl md:text-2xl">10</span> / 10 Words
                </div>
                <div id="sync-status" class="mt-3 text-xs text-gray-500 font-bold tracking-wide">Syncing data...</div>
            </div>
            
            <div class="relative z-10 flex flex-col sm:flex-row gap-4 w-full justify-center mt-2">
                <button onclick="nav('screen-4')" class="btn-roblox flex-1 max-w-[200px] bg-purple-500 text-white py-3 px-3 rounded-2xl text-lg md:text-xl flex items-center justify-center min-w-0">
                    <span class="mr-1.5">📚</span> <span class="truncate">New Topic</span>
                </button>
                <button onclick="startGame()" class="btn-roblox flex-1 max-w-[200px] bg-green-500 text-white py-3 px-3 rounded-2xl text-lg md:text-xl flex items-center justify-center min-w-0">
                    <span class="mr-1.5">🔄</span> <span class="truncate">Try Again</span>

        </div>

        <!-- Fullscreen Toggle -->
        <button onclick="toggleFullScreen()" class="absolute top-4 right-4 z-50 bg-white border-2 border-black p-2 rounded-lg shadow-[2px_2px_0_0_#000] active:translate-y-1 active:shadow-none text-black hover:bg-gray-200">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
        </button>

    </div>

    <!-- JAVASCRIPT -->
    <script>
        // --- NAME CAPITALIZATION FORMATTER (Only First Letter Capitalized) ---
        function capitalizeName(name) {
            if (!name) return "";
            return name.trim().split(/\s+/).map(word => {
                return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
            }).join(' ');
        }

        // --- NATIVE SOUND FX GENERATOR (Tone substitute) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            const now = audioCtx.currentTime;
            
            if (type === 'tap') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(450, now);
                osc.frequency.exponentialRampToValueAtTime(150, now + 0.08);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                osc.start(now);
                osc.stop(now + 0.08);
            } 
            else if (type === 'countdown') {
                // High-pitched retro countdown beep
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1000, now); 
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            }
            else if (type === 'correct') {
                const notes = [523.25, 659.25, 783.99, 1046.50]; 
                notes.forEach((freq, idx) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + idx * 0.08);
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.15, now + idx * 0.08 + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.08 + 0.15);
                    osc.start(now + idx * 0.08);
                    osc.stop(now + idx * 0.08 + 0.2);
                });
            } 
            else if (type === 'wrong') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(140, now);
                osc.frequency.setValueAtTime(100, now + 0.15);
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                osc.start(now);
                osc.stop(now + 0.35);
            } 
            else if (type === 'hint') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, now);
                osc.frequency.exponentialRampToValueAtTime(1320, now + 0.18);
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.18);
                osc.start(now);
                osc.stop(now + 0.18);
            } 
            else if (type === 'skip') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(580, now);
                osc.frequency.linearRampToValueAtTime(280, now + 0.25);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start(now);
                osc.stop(now + 0.25);
            } 
            else if (type === 'fanfare') {
                const freqs = [261.63, 329.63, 392.00, 523.25];

                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, now);
                    osc.frequency.setValueAtTime(freq * 1.5, now + 0.2);
                    gain.gain.setValueAtTime(0.12, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.7);
                    osc.start(now);
                    osc.stop(now + 0.7);
                });
            }

                state.attempts = 0;

            state.gameActive = true;

            const len = state.currentWord.length;
            for (let i = 0; i < len; i++) {
                const box = document.getElementById(`box-${i}`);
                if(box) {
                    box.innerText = state.inputLetters[i] || '';
                    if (i === state.cursorIndex && state.gameActive) {
                        box.classList.add('active-cursor');
                    } else {
                        box.classList.remove('active-cursor');
                    }
                    
                    // Locked vowel visual styling
                    if (state.hintLocked[i]) {
                        box.classList.add('bg-yellow-100');
                        box.classList.remove('bg-white');
                    } else {
                        box.classList.remove('bg-yellow-100');
                        box.classList.add('bg-white');
                    }
                }
            }
        }

        // Helper: Find next non-locked index
        function getNextUnlockedIndex(curr) {
            for (let i = curr + 1; i < state.currentWord.length; i++) {
                if (!state.hintLocked[i]) return i;
            }
            // Loop back from beginning
            for (let i = 0; i < state.currentWord.length; i++) {
                if (!state.hintLocked[i]) return i;
            }
            return curr;
        }

        function getPrevUnlockedIndex(curr) {
            for (let i = curr - 1; i >= 0; i--) {
                if (!state.hintLocked[i]) return i;
            }
            return curr;
        }

        // --- KEYBOARD & INPUT LOGIC ---
        function renderKeyboard() {
            const container = document.getElementById('keyboard');
            container.innerHTML = '';

            let isUpper = state.shiftState > 0;

            keyboardLayout.forEach((row, rowIndex) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'flex justify-center gap-1 md:gap-2 w-full h-12 md:h-16';
                
                row.forEach(key => {
                    const btn = document.createElement('button');
                    let displayChar = key;
                    if (key.length === 1) {
                        displayChar = isUpper ? key.toUpperCase() : key.toLowerCase();
                    }

                    btn.innerText = displayChar;
                    
                    // First 3 rows must maintain identical proportions with equal sizes
                    if (rowIndex < 3) {
                        btn.className = 'key font-balsamiq flex-1 max-w-[80px] min-w-0 text-xl md:text-3xl rounded-lg md:rounded-xl shadow-[2px_2px_0_0_#000] border-2 md:border-3 border-black active:translate-y-[2px] active:shadow-none truncate';
                    } else {
                        // Bottom Row (CLEAR, SPACE, BACKSPACE, ENTER) scales to fill layout according to ratios
                        btn.className = 'key font-balsamiq min-w-0 text-xl md:text-3xl rounded-lg md:rounded-xl shadow-[2px_2px_0_0_#000] border-2 md:border-3 border-black active:translate-y-[2px] active:shadow-none truncate';
                        
                        // Set specific percentage ratios
                        if (key === 'CLEAR') {
                            btn.classList.add('flex-[2]'); // 20%
                        } else if (key === 'SPACE') {
                            btn.classList.add('flex-[3]'); // 30%
                        } else if (key === 'BACKSPACE') {
                            btn.classList.add('flex-[2]'); // 20%
                        } else if (key === 'ENTER') {
                            btn.classList.add('flex-[3]'); // 30%
                        }
                    }

                    // Styling based on character type
                    if (key.length > 1) {
                        btn.classList.add('key-action');
                        
                        if(key === 'BACKSPACE') {
                            btn.classList.add('text-2xl', 'md:text-4xl');
                            displayChar = '⌫';
                        }
                        if(key === 'SHIFT') {
                            displayChar = '⇧';
                            btn.classList.add('text-3xl', 'md:text-5xl');
                            if(state.shiftState === 1) btn.classList.replace('bg-[#9ca3af]', 'bg-blue-400');
                            if(state.shiftState === 2) btn.classList.replace('bg-[#9ca3af]', 'bg-blue-600');
                        }
                        if(key === 'ENTER') {
                            btn.classList.replace('bg-[#9ca3af]', 'bg-green-500');
                            btn.classList.add('text-white');
                        }
                    } else if (vowels.includes(key)) {
                        btn.classList.add('key-vowel');
                    } else if (key === '-' || key === '\'') {
                        btn.classList.add('key-punct');
                    } else {
                        btn.classList.add('key-consonant');
                    }

                    // Disable check
                    if (state.disabledKeys.includes(key)) {
                        btn.classList.add('disabled');
                    }

                    // Click handlers
                    btn.onmousedown = (e) => { e.preventDefault(); handleKeyClick(key); };
                    btn.ontouchstart = (e) => { e.preventDefault(); handleKeyClick(key); };
                    
                    btn.innerText = displayChar;
                    rowDiv.appendChild(btn);
                });
                container.appendChild(rowDiv);
            });
        }

        function handleKeyClick(key) {
            if (!state.gameActive) return;

            playSound('tap');

            if (key === 'SHIFT') {
                state.shiftState = (state.shiftState + 1) % 3;
                renderKeyboard();
                return;
            } else if (key === 'CLEAR') {
                state.inputLetters.forEach((letter, idx) => {
                    if (!state.hintLocked[idx]) {
                        state.inputLetters[idx] = '';
                    }
                });
                state.cursorIndex = state.hintLocked.indexOf(false);
                if (state.cursorIndex === -1) state.cursorIndex = 0;
            } else if (key === 'BACKSPACE') {
                if (state.inputLetters[state.cursorIndex] === '') {
                    let prev = getPrevUnlockedIndex(state.cursorIndex);
                    if (prev !== state.cursorIndex) {
                        state.cursorIndex = prev;
                        state.inputLetters[state.cursorIndex] = '';
                    }
                } else {
                    if (!state.hintLocked[state.cursorIndex]) {
                        state.inputLetters[state.cursorIndex] = '';
                    }
                }
            } else if (key === 'SPACE') {
                if (!state.hintLocked[state.cursorIndex]) {
                    state.inputLetters[state.cursorIndex] = ' ';
                }
                state.cursorIndex = getNextUnlockedIndex(state.cursorIndex);
            } else if (key === 'ENTER') {
                checkAnswer();
                return; 
            } else {
                let char = state.shiftState > 0 ? key.toUpperCase() : key.toLowerCase();
                if (!state.hintLocked[state.cursorIndex]) {
                    state.inputLetters[state.cursorIndex] = char;
                }
                
                state.cursorIndex = getNextUnlockedIndex(state.cursorIndex);
                
                if (state.shiftState === 1) { 
                    state.shiftState = 0; 
                    renderKeyboard();
                }
            }
            updateBoxContent();
        }

        function setupPhysicalKeyboard() {
            document.addEventListener('keydown', (e) => {
                if(!state.gameActive) return;
                
                if(e.key === 'Enter') { 
                    handleKeyClick('ENTER'); 
                }
                else if(e.key === 'Backspace') { 
                    handleKeyClick('BACKSPACE'); 
                }
                else if(e.key === ' ') { 
                    e.preventDefault(); 
                    handleKeyClick('SPACE'); 
                }
                else if(e.key === 'Escape') { 
                    handleKeyClick('CLEAR'); 
                }
                else if(e.key.length === 1) {
                    if(/[a-zA-Z\-']/.test(e.key)) {
                        let keyToPass = e.key.toLowerCase();
                        let originalShift = state.shiftState;
                        if(e.getModifierState('CapsLock')) {
                            state.shiftState = 2;
                        }
                        else if(e.shiftKey) {
                            state.shiftState = 1;
                        }
                        else {
                            state.shiftState = 0;
                        }
                        
                        handleKeyClick(keyToPass);
                        state.shiftState = originalShift; 
                        renderKeyboard();
                    }
                }
            });
        }

        // --- SPELLING GAMEPLAY SYSTEM ---
        function toggleVoice() {
            playSound('tap');
            state.voiceGender = state.voiceGender === 'female' ? 'male' : 'female';
            document.getElementById('ui-voice').innerText = state.voiceGender === 'female' ? 'Girl' : 'Boy';
            saveState();
        }

        function playWord(rate) {
            if (!synth) return;
            synth.cancel();
            
            const utterance = new SpeechSynthesisUtterance(state.currentWord);
            utterance.rate = rate;
            
            let selectedVoice = null;
            if (voices.length > 0) {
                let potentials = voices.filter(v => v.lang.startsWith('en'));
                if(state.voiceGender === 'female') {
                    selectedVoice = potentials.find(v => v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('girl') || v.name.toLowerCase().includes('samantha') || v.name.toLowerCase().includes('zira'));
                } else {
                    selectedVoice = potentials.find(v => v.name.toLowerCase().includes('male') || v.name.toLowerCase().includes('boy') || v.name.toLowerCase().includes('david') || v.name.toLowerCase().includes('daniel') || v.name.toLowerCase().includes('mark'));
                }
                
                if(!selectedVoice && potentials.length > 0) {
                    if(state.voiceGender === 'female') selectedVoice = potentials[0];
                    else selectedVoice = potentials.length > 1 ? potentials[1] : potentials[0];
                }
                
                if(selectedVoice) utterance.voice = selectedVoice;
            }
            
            synth.speak(utterance);
        }

        function useHint() {
            if (!state.gameActive) return;
            
            let targetChars = state.currentWord.split('');
            let hintAdded = false;
            
            for(let i=0; i < targetChars.length; i++) {
                if (vowels.includes(targetChars[i].toLowerCase())) {
                    // Check if this vowel position is not yet locked from previous hints
                    if (!state.hintLocked[i]) {
                        playSound('hint');
                        
                        state.inputLetters[i] = targetChars[i];
                        state.hintLocked[i] = true; // Lock vowel position
                        state.score -= 3;
                        showFeedback('Hint Used -3', 'bg-yellow-500', 1000);
                        
                        if (state.cursorIndex === i) {
                            state.cursorIndex = getNextUnlockedIndex(i);
                        }
                        
                        updateBoxContent();
                        updateTopUI();
                        hintAdded = true;
                        break;
                    }
                }
            }
            if(!hintAdded) {
                showFeedback('No vowels left', 'bg-gray-500', 1000);
            }
        }

        function skipWord() {
            if (!state.gameActive) return;
            playSound('skip');
            state.attempts++;
            state.targetWords.push(state.targetWords.splice(state.currentWordIndex, 1)[0]);
            updateTopUI();
            loadNextWordUI();
        }

        function checkAnswer() {
            const assembledInput = state.inputLetters.join('').trim();
            if (assembledInput.length === 0) return;
            
            state.attempts++;
            
            if (assembledInput.toLowerCase() === state.currentWord.toLowerCase()) {
                playSound('correct');
                state.correctAnswers++;
                state.score += 10;
                
                // Show completed word with preserved layout typed cases
                const container = document.getElementById('answer-container');
                container.innerHTML = `
                    <div class="w-full max-w-xl py-6 rounded-3xl border-8 border-black shadow-[6px_6px_0_0_#000] bg-green-500 text-white text-center font-bold text-5xl md:text-7xl tracking-widest animate-bounce">
                        ${assembledInput}
                    </div>
                `;
                
                showFeedback('CORRECT!', 'bg-green-500', 2000);
                playWord(1); 
                
                document.getElementById('wrong-actions').classList.add('hidden');
                document.getElementById('next-action').classList.remove('hidden');
                document.getElementById('submit-action').classList.add('hidden');
                state.gameActive = false; 
            } else {
                playSound('wrong');
                state.score -= 1;
                showFeedback('WRONG', 'bg-red-600', 1500);
                disableRandomKeys(3);
                
                document.getElementById('wrong-actions').classList.remove('hidden');
                document.getElementById('submit-action').classList.add('hidden');
            }
            updateTopUI();
        }

        function clearInput() {
            playSound('tap');
            state.inputLetters.forEach((letter, idx) => {
                if (!state.hintLocked[idx]) {
                    state.inputLetters[idx] = '';
                }
            });
            state.cursorIndex = state.hintLocked.indexOf(false);
            if (state.cursorIndex === -1) state.cursorIndex = 0;

            renderAnswerBoxes();
            document.getElementById('wrong-actions').classList.add('hidden');
            document.getElementById('submit-action').classList.remove('hidden');
        }

        function disableRandomKeys(count) {
            let wordChars = state.currentWord.toLowerCase().split('');
            let availableConsonants = keyboardLayout.flat().filter(k => 
                k.length === 1 && 
                !vowels.includes(k) && 
                !wordChars.includes(k) && 
                !state.disabledKeys.includes(k) &&
                k !== '-' && k !== '\''
            );
            
            availableConsonants.sort(() => 0.5 - Math.random());
            let toDisable = availableConsonants.slice(0, count);
            
            state.disabledKeys.push(...toDisable);
            renderKeyboard();
        }

        function showFeedback(text, bgClass, duration) {
            const overlay = document.getElementById('feedback-overlay');
            const msgBox = document.getElementById('feedback-msg');
            
            msgBox.innerText = text;
            msgBox.className = `font-roblox-title text-5xl md:text-7xl px-12 py-6 rounded-3xl border-8 border-black transform -rotate-3 text-white ${bgClass} shadow-[8px_8px_0_0_#000]`;
            
            overlay.classList.remove('opacity-0', 'pointer-events-none');
            
            setTimeout(() => {
                overlay.classList.add('opacity-0', 'pointer-events-none');
            }, duration);
        }

        function nextWord() {
            playSound('tap');
            state.currentWordIndex++;
            if (state.currentWordIndex >= 10) {
                endGame();
            } else {
                state.gameActive = true;
                loadNextWordUI();
            }
        }

        // --- ENDGAME & CLOUD REPORTING ---
        function endGame() {
            clearInterval(state.timerInterval);
            state.gameActive = false;
            
            playSound('fanfare');
            
            document.getElementById('result-name').innerText = capitalizeName(state.studentName);
            document.getElementById('result-score').innerText = state.score;
            document.getElementById('result-words').innerText = state.currentWordIndex;

            const rankTitle = document.getElementById('result-badge-title');
            const rankSubtitle = document.getElementById('result-badge-subtitle');
            if (state.score >= 100) {
                rankTitle.innerText = "🏆 MASTER SPELLER!";
                rankSubtitle.innerText = "S-Rank Unlocked • 🌟 LEGENDARY 🌟";
            } else if (state.score >= 80) {
                rankTitle.innerText = "⭐ SPELLING HERO!";
                rankSubtitle.innerText = "A-Rank Unlocked • 🔥 AMAZING 🔥";
            } else if (state.score >= 50) {
                rankTitle.innerText = "⚔️ SPELLING WARRIOR";
                rankSubtitle.innerText = "B-Rank • 🌱 GROWING STRONG 🌱";
            } else {
                rankTitle.innerText = "🌱 SPELLING APPRENTICE";
                rankSubtitle.innerText = "Keep practicing to level up! 🦾";
            }

            nav('screen-result');
            startConfetti();

            sendDataToSheets();
            localStorage.removeItem('spellingGameState');
        }

        function sendDataToSheets() {
            const statusEl = document.getElementById('sync-status');
            statusEl.innerText = "Saving results to cloud...";
            statusEl.className = "mt-4 text-sm text-yellow-600 font-bold animate-pulse";

            const payload = {
                Timestamp: new Date().toISOString(),
                School: state.school,
                Class: state.classGrade + 'A', // Stores standard labels like '3A'
                StudentID: state.studentId,
                StudentName: capitalizeName(state.studentName),
                Topic: state.topicName,
                Subtopic: state.subtopic,
                TimeTaken: 480 - state.timer, 
                Score: state.score
            };

            // Remove headers key content to bypass preflight locks entirely
            fetch(GOOGLE_APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                body: JSON.stringify(payload)
            }).then(() => {
                statusEl.innerText = "✓ Results saved directly to Sheet!";
                statusEl.className = "mt-4 text-sm text-green-600 font-bold";
            }).catch(error => {
                console.error('Error saving data:', error);
                statusEl.innerText = "⚠ Saved locally. Cloud sync failed.";
                statusEl.className = "mt-4 text-sm text-red-600 font-bold";
            });
        }

        // --- CELEBRATORY CONFETTI ENGINE ---
        let confettiActive = false;
        function startConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            
            const colors = ['#f43f5e', '#3b82f6', '#10b981', '#eab308', '#ec4899', '#8b5cf6'];
            const particles = [];
            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 6 + 4,
                    d: Math.random() * canvas.height,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    tilt: Math.random() * 10 - 5,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                    tiltAngle: 0
                });
            }
            
            confettiActive = true;
            function draw() {
                if (!confettiActive) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let results = false;
                particles.forEach((p, index) => {
                    p.tiltAngle += p.tiltAngleIncremental;
                    p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                    p.x += Math.sin(p.tiltAngle);
                    p.tilt = Math.sin(p.tiltAngle - (index / 3)) * 15;
                    
                    if (p.y <= canvas.height) {
                        results = true;
                    } else {
                        p.y = -20;
                        p.x = Math.random() * canvas.width;
                    }
                    
                    ctx.beginPath();
                    ctx.lineWidth = p.r;
                    ctx.strokeStyle = p.color;
                    ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                    ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                    ctx.stroke();
                });
                if (results) {
                    requestAnimationFrame(draw);
                }
            }
            draw();
        }
        
        function stopConfetti() {
            confettiActive = false;
        }

        // --- PERSISTENCE UTILITIES ---
        function toggleFullScreen() {
            playSound('tap');
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Fullscreen error: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        function saveState() {
            if (state.studentName) {
                localStorage.setItem('spellingGameState', JSON.stringify(state));
            }
        }

        function checkSavedGame() {
            const saved = localStorage.getItem('spellingGameState');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (parsed.gameActive || (parsed.targetWords && parsed.targetWords.length > 0 && parsed.currentWordIndex < 10)) {
                        document.getElementById('resume-banner').classList.remove('hidden');
                        document.getElementById('resume-banner').classList.add('flex');
                    }
                } catch (e) {
                    console.error("Corrupted save data");
                }
            }
        }

        function resumeGame() {
            playSound('tap');
            const saved = localStorage.getItem('spellingGameState');
            if (saved) {
                state = JSON.parse(saved);
                if (state.gameActive || (state.targetWords.length > 0 && state.currentWordIndex < 10)) {
                    state.gameActive = true;
                    nav('screen-game');
                    updateTopUI();
                    renderKeyboard();
                    renderAnswerBoxes();
                    
                    clearInterval(state.timerInterval);
                    state.timerInterval = setInterval(updateTimer, 1000);
                } else {
                    nav('screen-4');
                    renderTopics();
                }
            }
        }

        function clearSave() {
            playSound('tap');
            localStorage.removeItem('spellingGameState');
            document.getElementById('resume-banner').classList.add('hidden');
            document.getElementById('resume-banner').classList.remove('flex');
        }

    </script>
