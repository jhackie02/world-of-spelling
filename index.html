    <style>
        /* FONT ASSIGNMENTS */
        .font-roblox { font-family: 'Russo One', sans-serif; }
        .font-heading { font-family: 'Yusei Magic', sans-serif; }
        .font-main { font-family: 'Comic Sans MS', 'Comic Sans', 'Comic Neue', cursive; }
        .font-keyboard { font-family: 'Balsamiq Sans', cursive; }

        /* ROBLOX-INSPIRED UI (Chunky, Solid Colors, No Gradients) */
        body {
            background-color: #87CEEB; /* Sky Blue Base */
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden; /* Prevent scrolling */
            touch-action: manipulation;
        }

        /* OPTIONAL BACKGROUND IMAGE 
           Change the URL below to any Roblox-style PNG or background you prefer.
        */
        #bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('https://www.esrb.org/wp-content/uploads/2023/08/Roblox-Key.png'); 
            background-size: cover;
            background-position: center;
            opacity: 0.25; /* Keeps it subtle so text is readable */
            z-index: -1;
        }

        .roblox-box {
            background-color: #ffffff;
            border: 4px solid #000000;
            box-shadow: 6px 6px 0px #000000;
            border-radius: 12px;
        }

        .roblox-btn {
            background-color: #3b82f6; /* Default Blue */
            border: 3px solid #000000;
            box-shadow: 4px 4px 0px #000000;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            transition: all 0.1s;
            cursor: pointer;
            text-align: center;
        }
        
        .roblox-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #000000;
        }

        .btn-green { background-color: #22c55e; }
        .btn-red { background-color: #ef4444; }
        .btn-yellow { background-color: #eab308; color: #000; }
        .btn-purple { background-color: #a855f7; }
        .btn-orange { background-color: #f97316; }
        .btn-gray { background-color: #6b7280; }

        /* KEYBOARD STYLING */
        .key {
            background-color: #f3f4f6;
            border: 2px solid #000;
            box-shadow: 2px 2px 0px #000;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.25rem;
            cursor: pointer;
            transition: all 0.05s;
        }
        .key:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #000;
            background-color: #e5e7eb;
        }
        .key-special { background-color: #d1d5db; }
        .key-enter { background-color: #22c55e; color: white; }

        /* ANIMATIONS */
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* OVERLAYS */
        .feedback-overlay {
            position: fixed;
            top: 60%; /* Shifted down to not cover the answer area */
            left: 0; right: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            background: transparent; /* Removed black overlay background */
            pointer-events: none; /* Let clicks pass through */
        }

        /* Hide elements */
        .hidden-screen { display: none !important; }
    </style>
</head>

    // ==========================================
    window.onload = () => {
        window.speechSynthesis.getVoices();
        const saved = localStorage.getItem('spellingGameState');
        if (saved) {
            document.getElementById('btn-resume').classList.remove('hidden');
        }
    };

    function showScreen(screenId) {
        document.querySelectorAll('body > div').forEach(div => {
            if (div.id.startsWith('screen-')) {
                div.classList.add('hidden-screen');
            }
        });
        document.getElementById(screenId).classList.remove('hidden-screen');
    }

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    // ==========================================
    // GAME FLOW
    // ==========================================
    function startGameFlow() {
        initAudio();
        localStorage.removeItem('spellingGameState');
        showScreen('screen-class');
    }

    function selectClass(className) {
        selectedClass = className;
        const grade = className.charAt(0);
        
        const listContainer = document.getElementById('student-list');
        listContainer.innerHTML = '';

        if (students[grade]) {
            students[grade].forEach(student => {
                const btn = document.createElement('button');
                btn.className = 'roblox-btn btn-blue text-xl py-4 font-bold';
                btn.textContent = `${student.id}-${student.name}`;
                btn.onclick = () => selectStudent(student);
                listContainer.appendChild(btn);
            });
        }
        showScreen('screen-student');
    }

    function selectStudent(student) {
        selectedStudent = student;
        renderTopics();
    }

    function renderTopics() {
        const listContainer = document.getElementById('topic-list');
        listContainer.innerHTML = '';

        topics.forEach(topic => {
            if (topic.assignedClasses.includes('all') || topic.assignedClasses.includes(selectedClass)) {
                const btn = document.createElement('button');
                btn.className = 'roblox-btn btn-purple text-2xl py-6 font-bold';
                btn.textContent = topic.name;
                btn.onclick = () => selectTopic(topic);
                listContainer.appendChild(btn);
            }
        });
        showScreen('screen-topics');
    }

    function selectTopic(topic) {
        selectedTopic = topic;
        document.getElementById('ready-name').textContent = `Hello, ${selectedStudent.name}`;
        showScreen('screen-ready');
        startCountdown();
    }

    function startCountdown() {
        let count = 5;
        const countDisplay = document.getElementById('countdown');
        countDisplay.textContent = count;
        
        const tick = setInterval(() => {
            count--;
            if (count > 0) {
                countDisplay.textContent = count;
                playBeep(400, 'sine', 0.1);
            } else {
                clearInterval(tick);
                playBeep(800, 'sine', 0.3);
                prepareGame();
            }
        }, 1000);
    }

    function prepareGame() {
        // Enforce Grade Constraints
        const grade = selectedClass.charAt(0);
        let maxLength = 6;
        if (grade === '3') maxLength = 3;
        else if (grade === '4') maxLength = 4;
        else if (grade === '5') maxLength = 5;
        else if (grade === '6') maxLength = 6;

        let baseList = selectedTopic.words.filter(w => {
            // Remove non-letters (like spaces) for exact letter count logic
            const letterCount = w.replace(/[^a-zA-Z]/g, '').length;
            return letterCount >= 2 && letterCount <= maxLength;
        });

        if (baseList.length === 0) {
            baseList = ['cat']; // Safe fallback if filtering removes all words
        }

        totalTopicWords = baseList.length;
        currentWordList = shuffleArray(baseList);
        
        // Reset stats
        timeRemaining = GAME_TIME;
        score = 0; correct = 0; wrong = 0; wordsAnswered = 0;
        document.getElementById('stat-topic').textContent = selectedTopic.name;
        
        startGameplay();
    }

    function resumeGame() {
        initAudio();
        const saved = JSON.parse(localStorage.getItem('spellingGameState'));
        if (saved) {
            selectedClass = saved.class;
            selectedStudent = saved.student;
            selectedTopic = saved.selectedTopic;
            timeRemaining = saved.timeRemaining;
            score = saved.score;
            correct = saved.correct;
            wrong = saved.wrong;
            wordsAnswered = saved.wordsAnswered;
            totalTopicWords = saved.totalTopicWords;
            currentWordList = saved.currentWordList;
            currentWord = saved.currentWord;
            
            document.getElementById('stat-topic').textContent = selectedTopic.name;
            updateStatsUI();
            startGameplay(true);
        }
    }

    function startGameplay(isResume = false) {
        isPlaying = true;
        showScreen('screen-game');
        
        timerInterval = setInterval(updateTimer, 1000);
        updateTimerDisplay();

        if (!isResume || !currentWord) {
            pickNextWord();
        } else {
            clearInput();
            setTimeout(() => playWordAudio(1.0), 500);
        }
        
        updateKeyboardDisplay();
    }

    // ==========================================
    // GAME MECHANICS
    // ==========================================
    function pickNextWord() {
        if (currentWordList.length === 0) {
            endGame();
            return;
        }
        currentWord = currentWordList.pop();
        clearInput();
        saveGameState();
        
        setTimeout(() => playWordAudio(1.0), 500);
    }

    function skipWord() {
        skipped++;
        updateStatsUI();
        showFeedback(false, currentWord, true); // True to show answer
        setTimeout(() => {
            document.getElementById('feedback-overlay').classList.add('hidden-screen');
            pickNextWord();
        }, 1500);
    }

    function submitAnswer() {
        if (currentInput.length === 0 || !currentWord) return;

        const isCorrect = currentInput.toLowerCase() === currentWord.toLowerCase();

        if (isCorrect) {
            correct++;
            updateInputDisplay(true); 
            showFeedback(true);
        } else {
            wrong++;
            showFeedback(false, currentWord, false);
        }
        
        updateStatsUI();
        saveGameState();
        
        setTimeout(() => {
            document.getElementById('feedback-overlay').classList.add('hidden-screen');
            if (isCorrect) pickNextWord();
        }, 1500);
    }

    function submitAnswer() {
        if (currentInput.length === 0 || !currentWord) return;

        const isCorrect = currentInput.toLowerCase() === currentWord.toLowerCase();

        if (isCorrect) {
            wordsAnswered++;
            score += currentWord.length;
            correct++;
            updateInputDisplay(true); // Force combined boxes view
            showFeedback(true);
            updateStatsUI();
            saveGameState();
            
            setTimeout(() => {
                document.getElementById('feedback-overlay').classList.add('hidden-screen');
                pickNextWord();
            }, 1500);

        } else {
            score -= 1;
            wrong++;
            showFeedback(false, currentWord);
            updateStatsUI();
            saveGameState();
            
            setTimeout(() => {
                document.getElementById('feedback-overlay').classList.add('hidden-screen');
            }, 1500);
        }
    }

    // ==========================================
    // INPUT & KEYBOARD LOGIC
    // ==========================================
    function typeLetter(letter) {
        if (currentInput.length >= currentWord.length) return; // Prevent over-typing
        
        let charToAdd = letter;
        if (letter !== ' ' && (shiftState === 1 || shiftState === 2)) {
            charToAdd = letter.toUpperCase();
        }
        
        currentInput += charToAdd;
        updateInputDisplay();

        if (shiftState === 1) {
            shiftState = 0;
            updateKeyboardDisplay();
        }
    }

    function backspace() {
        currentInput = currentInput.slice(0, -1);
        updateInputDisplay();
    }

    function clearInput() {
        currentInput = "";
        updateInputDisplay();
    }

    function toggleShift() {
        const now = Date.now();
        if (now - lastShiftTime < 400) {
            shiftState = 2; // Caps Lock
        } else {
            if (shiftState === 0) shiftState = 1;
            else if (shiftState === 1) shiftState = 0;
            else if (shiftState === 2) shiftState = 0;
        }
        lastShiftTime = now;
        updateKeyboardDisplay();
    }

    function updateInputDisplay(forceCombine = false) {
        const container = document.getElementById('answer-display');
        container.innerHTML = '';
        
        // Combine only when forceCombine is true (triggered when Enter is clicked and answer is correct)
        const isCorrect = forceCombine;

        // Success State -> Combine into one big block
        if (isCorrect) {
            const box = document.createElement('div');
            // Keep original case as typed
            box.className = 'roblox-box bg-green-400 text-black px-8 py-4 flex items-center justify-center text-4xl md:text-6xl font-bold transition-all duration-300 transform scale-110 shadow-lg';
            box.innerHTML = currentInput.replace(/ /g, '&nbsp;'); // preserve spaces visibly
            container.appendChild(box);
            return;
        }

        // Typing State -> Individual letter boxes
        for (let i = 0; i < currentWord.length; i++) {
            const box = document.createElement('div');
            
            if (currentWord[i] === ' ') {
                // Gap for compound words
                box.className = 'w-4 md:w-8 h-12 bg-transparent';
            } else {
                // Keep original case as typed, no 'uppercase' class
                box.className = 'roblox-box bg-yellow-200 text-black w-10 h-14 md:w-16 md:h-20 flex items-center justify-center text-3xl md:text-5xl font-bold transition-all';
            }
            
            if (i < currentInput.length) {
                if (currentInput[i] !== ' ') {
                    box.textContent = currentInput[i];
                }
            }
            container.appendChild(box);
        }
    }

    function updateKeyboardDisplay() {
        const shiftBtn = document.getElementById('key-shift');
        if (shiftState === 0) {
            shiftBtn.textContent = "⇧";
            shiftBtn.style.backgroundColor = "#d1d5db";
            shiftBtn.style.color = "black";
        } else if (shiftState === 1) {
            shiftBtn.textContent = "⇧";
            shiftBtn.style.backgroundColor = "#3b82f6";
            shiftBtn.style.color = "white";
        } else if (shiftState === 2) {
            shiftBtn.textContent = "CAPS";
            shiftBtn.style.backgroundColor = "#ef4444";
            shiftBtn.style.color = "white";
        }

        document.querySelectorAll('.key').forEach(btn => {
            if (btn.textContent.length === 1 && /[a-zA-Z]/.test(btn.textContent)) {
                btn.textContent = (shiftState > 0) ? btn.textContent.toUpperCase() : btn.textContent.toLowerCase();
            }
        });
    }

    // ==========================================
    // AUDIO (TTS & SFX)
    // ==========================================
    let currentVoiceType = 'neutral';
    
    function setVoice(type) {
        currentVoiceType = type;
        // Update UI
        document.querySelectorAll('[id^="voice-"]').forEach(btn => btn.classList.remove('ring-2', 'ring-offset-1', 'ring-black'));
        document.getElementById(`voice-${type}`).classList.add('ring-2', 'ring-offset-1', 'ring-black');
        
        // Test play
        playWordAudio(1.0, "Testing " + type + " voice");
    }

    function getVoice(type) {
        const voices = window.speechSynthesis.getVoices();
        if (type === 'neutral') return null; // Default
        
        // Try to match based on common voice names
        if (type === 'boy') {
            return voices.find(v => /male|david|mark|daniel/i.test(v.name)) || null;
        }
        if (type === 'girl') {
            return voices.find(v => /female|zira|samantha|alice/i.test(v.name)) || null;
        }
        return null;
    }

    function playWordAudio(rate, overrideText = null) {
        const textToSpeak = overrideText || currentWord;
        if (!textToSpeak) return;

        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(textToSpeak);
        utterance.rate = rate;
        utterance.lang = 'en-US';
        
        const selectedVoice = getVoice(currentVoiceType);
        if (selectedVoice) {
            utterance.voice = selectedVoice;
        }
        
        window.speechSynthesis.speak(utterance);
    }

    function playBeep(frequency, type, duration) {
        if (!audioCtx) return;
        try {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = type;
            oscillator.frequency.value = frequency;
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            oscillator.stop(audioCtx.currentTime + duration);
        } catch(e) { console.log("Audio play failed"); }
    }

    function playSuccessSound() {
        playBeep(600, 'sine', 0.1);
        setTimeout(() => playBeep(800, 'sine', 0.3), 100);
    }

    function playWrongSound() {
        playBeep(200, 'sawtooth', 0.4);
    }
    function showFeedback(isCorrect, word = "", isSkip = false) {
        const overlay = document.getElementById('feedback-overlay');
        const icon = document.getElementById('feedback-icon');
        const text = document.getElementById('feedback-text');
        
        overlay.classList.remove('hidden-screen');
        
        if (isCorrect) {
            icon.textContent = "✅";
            text.textContent = "CORRECT!";
            text.className = "font-roblox text-4xl text-green-600 tracking-widest";
            playSuccessSound();
        } else {
            icon.textContent = isSkip ? "⏭" : "❌";
            text.textContent = isSkip ? `WAS: ${word.toUpperCase()}` : "WRONG!";
            text.className = isSkip ? "font-roblox text-3xl text-orange-600 mt-2 tracking-wide" : "font-roblox text-3xl text-red-600 mt-2 tracking-wide";
            playWrongSound();
        }
    }

    // ==========================================
    // UI & TIMER UPDATES
    // ==========================================
    function updateStatsUI() {
        document.getElementById('stat-score').textContent = score;
        
        const totalAttempts = correct + wrong + skipped;
        let acc = 0;
        if (totalAttempts > 0) {
            acc = Math.round((correct / totalAttempts) * 100);
        }
        document.getElementById('stat-acc').textContent = acc + "%";
    }

    function updateTimer() {
        timeRemaining--;
        updateTimerDisplay();
        
        if (timeRemaining % 5 === 0) saveGameState(); 

        if (timeRemaining <= 0) endGame();
    }

    function updateTimerDisplay() {
        const m = Math.floor(timeRemaining / 60);
        const s = timeRemaining % 60;
        document.getElementById('timer-display').textContent = `${m}:${s.toString().padStart(2, '0')}`;
        
        if (timeRemaining <= 60) {
            document.getElementById('timer-display').classList.add('text-red-600', 'animate-pulse');
        }
    }

    // ==========================================
    // SAVE & END GAME
    // ==========================================
    function saveGameState() {
        if (!isPlaying) return;
        const state = {
            class: selectedClass,
            student: selectedStudent,
            selectedTopic: selectedTopic,
            timeRemaining: timeRemaining,
            score: score,
            correct: correct,
            wrong: wrong,
            wordsAnswered: wordsAnswered,
            totalTopicWords: totalTopicWords,
            currentWordList: currentWordList,
            currentWord: currentWord
        };
        localStorage.setItem('spellingGameState', JSON.stringify(state));
    }

    function endGame() {
        isPlaying = false;
        clearInterval(timerInterval);
        localStorage.removeItem('spellingGameState'); 
        window.speechSynthesis.cancel();
        
        showScreen('screen-end');
        
        // Calculate Final Score out of 100 based on completion of the topic
        let finalScore100 = 0;
        if (totalTopicWords > 0) {
            finalScore100 = Math.round((correct / totalTopicWords) * 100);
        }

        document.getElementById('end-student').textContent = `${selectedStudent.id}-${selectedStudent.name}`;
        document.getElementById('end-class').textContent = selectedClass;
        document.getElementById('end-topic').textContent = selectedTopic.name;
        document.getElementById('end-score').textContent = `${finalScore100} / 100`;
        document.getElementById('end-correct').textContent = correct;
        document.getElementById('end-wrong').textContent = wrong;
        document.getElementById('end-words').textContent = wordsAnswered;

        submitToGoogleSheets(finalScore100);
    }

    function submitToGoogleSheets(finalScore100) {
        const statusEl = document.getElementById('save-status');
        if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL === "PASTE_URL_HERE") {
            statusEl.textContent = "Google Sheets saving is not configured.";
            statusEl.className = "text-center font-bold text-lg mb-4 text-red-500";
            return;
        }

        const payload = {
            timestamp: new Date().toISOString(),
            class: selectedClass,
            studentId: selectedStudent.id,
            studentName: selectedStudent.name,
            topic: selectedTopic.name,
            score: finalScore100,
            correct: correct,
            wrong: wrong,
            wordsAnswered: wordsAnswered
        };

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(() => {
            statusEl.textContent = "✅ Saved to Google Sheets!";
            statusEl.className = "text-center font-bold text-lg mb-4 text-green-600";
        })
        .catch((error) => {
            console.error('Error:', error);
            statusEl.textContent = "⚠️ Could not save to cloud (Check connection).";
            statusEl.className = "text-center font-bold text-lg mb-4 text-red-500";
        });
    }

    // ==========================================
    // UTILS
    // ==========================================
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    window.addEventListener('beforeunload', function (e) {
        if (isPlaying) {
            e.preventDefault();
            e.returnValue = '';
        }
    });

</script>
